version: 1

default_model: claude-sonnet-4-6

# Ordered cheapest -> most capable. Escalation moves one entry down the list.
tiers:
  - name: quick_lookup
    model: claude-haiku-4-5
    description: >
      Single-question lookups, explain-this-snippet, small shell/one-liner help,
      formatting, commit messages, simple regex.
  - name: standard_dev
    model: claude-sonnet-4-6
    description: >
      Boilerplate, CRUD endpoints, unit tests, docs, single-file changes,
      straightforward bug fixes, dependency bumps, config changes.
  - name: hard_dev
    model: claude-opus-4-8
    description: >
      Architecture decisions, multi-file refactors, debugging non-obvious failures,
      concurrency/perf work, smart-contract or reserve-accounting logic,
      security-sensitive changes, large migrations.

path_overrides:
  # Sessions whose repo hints match any pattern skip classification and
  # force-pin this tier. Never eligible for downgrade.
  force_tier: hard_dev
  patterns:
    - "capyfi"            # DeFi protocol
    - "contracts"         # any smart-contract repo
    - "solidity"
    - "bridge"            # cross-chain bridges
    - "wfiat-core"        # issuance / reserve accounting
    - "reserves"
    - "custody"
    - "signer"            # key management / signing services

escalation:
  max_escalations: 2
  # Matched (case-insensitive) against the final user message; ^-anchored
  # patterns use re.match on the stripped text.
  retry_patterns:
    - "still failing"
    - "didn't work"
    - "that's wrong"
    - "try again"
    - "^no[,. ]"
  # Matched against tool_result content (truncated to 2k chars per block).
  failure_markers:
    - "FAILED"
    - "Traceback \\(most recent call last\\)"
    - "error TS\\d+"
    - "ExitCode: [1-9]"
  consecutive_tool_failures: 2

session:
  ttl_seconds: 28800
  redis_key_prefix: "router:session:"

# Per-Mtok USD, used only by scripts/replay_shadow.py spend projection.
pricing:
  claude-haiku-4-5: { in: 1.0, out: 5.0 }
  claude-sonnet-4-6: { in: 3.0, out: 15.0 }
  claude-opus-4-8: { in: 15.0, out: 75.0 }
