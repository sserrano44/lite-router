version: 1

# --- Example provider-agnostic ladder -------------------------------------
# Tier -> model is a bare model id; the LiteLLM model_list (deploy/litellm/
# litellm_config.yaml) binds each id to a provider deployment. Mix providers
# freely: this example spans Anthropic and xAI, and any tier could just as
# easily point at an open-weight model served by Ollama/vLLM/llama.cpp.
default_model: grok-4.5          # standard_dev tier — the fail-open default

# Ordered cheapest -> most capable. Escalation moves one entry down the list.
tiers:
  - name: quick_lookup
    model: claude-sonnet-5
    description: >
      Single-question lookups, explain-this-snippet, small shell/one-liner help,
      formatting, commit messages, simple regex.
  - name: standard_dev
    model: grok-4.5
    description: >
      Boilerplate, CRUD endpoints, unit tests, docs, single-file changes,
      straightforward bug fixes, dependency bumps, config changes.
  - name: high
    model: claude-opus-4-8
    description: >
      Architecture decisions, multi-file refactors, debugging non-obvious failures,
      concurrency/perf work, security-sensitive changes, large migrations.
  - name: ultra-think
    model: claude-fable-5
    description: >
      The hardest problems: deep multi-system reasoning, subtle concurrency or
      correctness bugs, novel algorithm design, high-stakes one-shot changes.

path_overrides:
  # Sessions whose repo hints match any pattern skip classification and
  # force-pin this tier. Never eligible for downgrade. Rename/replace these
  # patterns for your own high-stakes repos.
  force_tier: high
  patterns:
    - "contracts"         # any smart-contract repo
    - "solidity"
    - "bridge"            # cross-chain bridges
    - "reserves"          # issuance / reserve accounting
    - "custody"
    - "signer"            # key management / signing services

escalation:
  max_escalations: 3      # 3 hops across the 4-tier ladder
  # Matched (case-insensitive) against the final user message; ^-anchored
  # patterns use re.match on the stripped text.
  retry_patterns:
    - "still failing"
    - "didn't work"
    - "that's wrong"
    - "try again"
    - "^no[,. ]"
  # Matched against tool-result content (Anthropic tool_result blocks or an
  # OpenAI role=tool message), truncated to 2k chars.
  failure_markers:
    - "FAILED"
    - "Traceback \\(most recent call last\\)"
    - "error TS\\d+"
    - "ExitCode: [1-9]"
  consecutive_tool_failures: 2

session:
  ttl_seconds: 28800
  redis_key_prefix: "router:session:"

# Client housekeeping calls (title generation, summarization) share the real
# conversation's session id and often arrive first — without this they'd pin the
# whole session to the trivial-task tier. Any request whose system prompt
# contains one of these (case-insensitive) substrings is routed cheap and never
# pins. Add markers for whatever clients you run.
side_channels:
  system_patterns:
    - "you are a title generator"        # OpenCode thread-title side-channel

# Per-Mtok USD, used only by scripts/replay_shadow.py spend projection.
# Replace with your providers' real per-token prices.
pricing:
  claude-sonnet-5: { in: 3.0, out: 15.0 }
  grok-4.5: { in: 3.0, out: 15.0 }
  claude-opus-4-8: { in: 15.0, out: 75.0 }
  claude-fable-5: { in: 15.0, out: 75.0 }
