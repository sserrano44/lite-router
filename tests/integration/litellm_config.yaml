# Integration-test LiteLLM config: every deployment is a mock_response so no
# API keys are needed; the response content reveals which model group routed.
model_list:
  - model_name: lite-auto
    litellm_params:
      model: xai/grok-4.5
      api_key: mock-key
      mock_response: "routed:default-alias"
  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_key: mock-key
      mock_response: "routed:claude-sonnet-5"
  - model_name: grok-4.5
    litellm_params:
      model: xai/grok-4.5
      api_key: mock-key
      mock_response: "routed:grok-4.5"
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: mock-key
      mock_response: "routed:claude-opus-4-8"
  - model_name: claude-fable-5
    litellm_params:
      model: anthropic/claude-fable-5
      api_key: mock-key
      mock_response: "routed:claude-fable-5"

litellm_settings:
  callbacks: custom_callbacks.proxy_handler_instance
  drop_params: true

general_settings:
  master_key: sk-test-master
