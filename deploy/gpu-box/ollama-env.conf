# systemd drop-in for the Ollama server on the GPU box (R15).
# Install: sudo mkdir -p /etc/systemd/system/ollama.service.d
#          sudo cp ollama-env.conf /etc/systemd/system/ollama.service.d/router.conf
#          sudo systemctl daemon-reload && sudo systemctl restart ollama
# (For a user-level ollama unit, put it under ~/.config/systemd/user/ollama.service.d/)
[Service]
# Never unload the classifier model from VRAM.
Environment=OLLAMA_KEEP_ALIVE=-1
# Absorb concurrent session starts across the team.
Environment=OLLAMA_NUM_PARALLEL=4
