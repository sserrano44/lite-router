[project]
name = "router-common"
version = "0.1.0"
description = "Shared policy models, hashing, and event types for the ripio-auto router"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/router_common"]
