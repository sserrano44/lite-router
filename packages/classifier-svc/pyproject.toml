[project]
name = "classifier-svc"
version = "0.1.0"
description = "FastAPI service wrapping Ollama for session-task classification"
requires-python = ">=3.11"
dependencies = [
    "router-common",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "httpx>=0.27",
]

[project.scripts]
classifier-svc = "classifier_svc.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/classifier_svc"]
