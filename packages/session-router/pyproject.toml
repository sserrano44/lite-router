[project]
name = "session-router"
version = "0.1.0"
description = "LiteLLM pre-call hook: session-pinned model routing for lite-auto"
requires-python = ">=3.11"
dependencies = [
    "router-common",
    "redis>=5.0",
    "httpx>=0.27",
    "asyncpg>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/session_router"]
